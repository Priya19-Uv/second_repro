<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRM Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 40px;
      width: 350px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #2a5298;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-box button:hover {
      background: #1e3c72;
    }

    .login-box a {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #2a5298;
      text-decoration: none;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #2a5298;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <div class="logo">VELVORAX CRM</div>
    <h2>Login</h2>

    <input type="email" placeholder="Enter Email">
    <input type="password" placeholder="Enter Password">
    <input type="No Employees" placeholder="Number of Employees">

    <button>Login</button>

    <a href="#">Forgot Password?</a>
    <a href="#">Create Account</a>
  </div>

</body>
</html>
